{% extends "base.html" %}
{% block title %}Quiz Generator - StudyAI{% endblock %}
{% block content %}
<div class="container">
    <h4 class="fw-bold mb-4"><i class="fas fa-question-circle text-warning me-2"></i>Quiz & Test Generator</h4>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="fw-bold mb-3">Quiz Settings</h6>
                    <div class="mb-3">
                        <label class="form-label">Topic</label>
                        <input type="text" id="quizTopic" class="form-control" placeholder="e.g. Python Functions, World War 2">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quiz Type</label>
                        <select id="quizType" class="form-select">
                            <option value="mcq">Multiple Choice (MCQ)</option>
                            <option value="short answer">Short Answer</option>
                            <option value="true/false">True / False</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Difficulty</label>
                        <select id="difficulty" class="form-select">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Number of Questions</label>
                        <input type="number" id="numQuestions" class="form-control" value="5" min="1" max="10">
                    </div>
                    <button class="btn btn-warning w-100 fw-bold" onclick="generateQuiz()" id="genBtn">
                        <i class="fas fa-magic me-2"></i>Generate Quiz
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div id="quizArea" class="text-center text-muted py-5">
                <i class="fas fa-clipboard-list fa-3x mb-3 opacity-25"></i>
                <p>Configure your quiz settings and click Generate</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentQuiz = null;
let userAnswers = {};

async function generateQuiz() {
    const btn = document.getElementById("genBtn");
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Generating...';

    const res = await fetch("/quiz/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            topic: document.getElementById("quizTopic").value,
            quiz_type: document.getElementById("quizType").value,
            difficulty: document.getElementById("difficulty").value,
            num_questions: document.getElementById("numQuestions").value
        })
    });
    const data = await res.json();
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-magic me-2"></i>Generate Quiz';

    if (data.error) {
        document.getElementById("quizArea").innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        return;
    }

    currentQuiz = data;
    userAnswers = {};
    renderQuiz(data);
}

function renderQuiz(data) {
    let html = `<div class="quiz-container">`;
    data.questions.forEach((q, i) => {
        html += `<div class="card mb-3 shadow-sm border-0">
            <div class="card-body">
                <p class="fw-bold">Q${i+1}. ${q.question}</p>`;
        if (q.options && q.options.length) {
            q.options.forEach(opt => {
                html += `<div class="form-check">
                    <input class="form-check-input" type="radio" name="q${i}" value="${opt}" onchange="userAnswers[${i}]='${opt.replace(/'/g,"\\'")}'" id="q${i}_${opt}">
                    <label class="form-check-label" for="q${i}_${opt}">${opt}</label>
                </div>`;
            });
        } else {
            html += `<input type="text" class="form-control mt-2" placeholder="Your answer..." onchange="userAnswers[${i}]=this.value">`;
        }
        html += `</div></div>`;
    });
    html += `<button class="btn btn-success w-100 fw-bold" onclick="submitQuiz()">
        <i class="fas fa-check me-2"></i>Submit Quiz
    </button></div>`;
    document.getElementById("quizArea").innerHTML = html;
}

async function submitQuiz() {
    let score = 0;
    const questions = currentQuiz.questions;
    let resultHtml = `<h5 class="fw-bold mb-3">Quiz Results</h5>`;

    questions.forEach((q, i) => {
        const userAns = (userAnswers[i] || "").trim().toLowerCase();
        const correct = q.answer.trim().toLowerCase();
        const isCorrect = userAns === correct || correct.includes(userAns) || userAns.includes(correct);
        if (isCorrect) score++;

        resultHtml += `<div class="card mb-2 border-0 shadow-sm ${isCorrect ? 'border-start border-success border-3' : 'border-start border-danger border-3'}">
            <div class="card-body py-2">
                <p class="mb-1 fw-bold">Q${i+1}. ${q.question}</p>
                <p class="mb-1 small">Your answer: <span class="${isCorrect ? 'text-success' : 'text-danger'}">${userAnswers[i] || 'Not answered'}</span></p>
                ${!isCorrect ? `<p class="mb-1 small text-success">Correct: ${q.answer}</p>` : ''}
                <p class="mb-0 small text-muted">${q.explanation || ''}</p>
            </div>
        </div>`;
    });

    const pct = Math.round((score / questions.length) * 100);
    const badge = pct >= 80 ? 'success' : pct >= 50 ? 'warning' : 'danger';
    resultHtml = `<div class="alert alert-${badge} text-center mb-3">
        <h4>${score}/${questions.length} (${pct}%)</h4>
        <p class="mb-0">${pct >= 80 ? '🎉 Excellent!' : pct >= 50 ? '👍 Good effort!' : '📚 Keep practicing!'}</p>
    </div>` + resultHtml;

    document.getElementById("quizArea").innerHTML = resultHtml;

    await fetch("/quiz/submit", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            topic: document.getElementById("quizTopic").value,
            score, total: questions.length,
            difficulty: document.getElementById("difficulty").value
        })
    });
}
</script>
{% endblock %}
